name: Build and Push to Snowflake Registry

on:
  push:
    branches: [ main ]
    paths:
      - 'src/backend/**'
      - 'src/frontend/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Snowflake CLI
        run: pip install snowflake-cli-labs --quiet

      - name: Configure Snowflake connection
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml << 'TOML'
          [connections.default]
          account = "VEB81086.us-east-1"
          user = "PGUERRERO"
          authenticator = "SNOWFLAKE_JWT"
          private_key_path = "/tmp/rsa_key.p8"
          role = "TASTY_APP_ADMIN_ROLE__PAMELA_GUERRERO"
          TOML
          chmod 0600 ~/.snowflake/config.toml

      - name: Write private key
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/rsa_key.p8
          chmod 600 /tmp/rsa_key.p8

      - name: Login to Snowflake registry
        run: |
          snow spcs image-registry login \
            --connection default \
            --account VEB81086.us-east-1 \
            --user PGUERRERO \
            --authenticator SNOWFLAKE_JWT \
            --private-key-file /tmp/rsa_key.p8

      - name: Build and push backend
        run: |
          docker build --no-cache --platform linux/amd64 \
            -t ${{ secrets.REPO_URL }}/backend_service_image:latest \
            ./src/backend
          docker push ${{ secrets.REPO_URL }}/backend_service_image:latest

      - name: Build and push frontend
        run: |
          docker build --platform linux/amd64 \
            -t ${{ secrets.REPO_URL }}/frontend_service_image:latest \
            ./src/frontend/frontend
          docker push ${{ secrets.REPO_URL }}/frontend_service_image:latest

      - name: Build and push router
        run: |
          docker build --platform linux/amd64 \
            -t ${{ secrets.REPO_URL }}/router_service_image:latest \
            ./src/frontend/router
          docker push ${{ secrets.REPO_URL }}/router_service_image:latest

      - name: Summary
        run: |
          echo "## ✅ Images pushed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- backend_service_image:latest" >> $GITHUB_STEP_SUMMARY
          echo "- frontend_service_image:latest" >> $GITHUB_STEP_SUMMARY
          echo "- router_service_image:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next: run ALTER SERVICE or DROP/CREATE SERVICE in Snowflake to pick up new images" >> $GITHUB_STEP_SUMMARY
